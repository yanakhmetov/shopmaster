version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: shop_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shopdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - shop_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shop_app
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "5555:5555"  # Добавляем порт для Prisma Studio
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/shopdb
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-mysecretkey123456789}
      NEXTAUTH_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - shop_network
    # Автоматическая инициализация базы
    command: >
      sh -c "
        echo '⏳ Ожидание PostgreSQL...' &&
        while ! nc -z postgres 5432; do sleep 1; done &&
        echo '✅ PostgreSQL готов' &&
        echo '📦 Выполнение миграций...' &&
        npx prisma migrate deploy &&
        echo '🌱 Добавление тестовых данных...' &&
        node seed.js &&
        node seed-admin.js &&
        echo '🚀 Запуск приложения...' &&
        npm start
      "

volumes:
  postgres_data:

networks:
  shop_network:
    driver: bridge